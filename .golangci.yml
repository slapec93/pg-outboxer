version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code
    - misspell      # Check for misspelled words
    - revive        # Drop-in replacement for golint
    - unconvert     # Remove unnecessary type conversions
    - gocritic      # Opinionated linter

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow      # Too many false positives

  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true  # Not all packages need comments

  gosec:
    excludes:
      - G101  # Hardcoded credentials - test code only
      - G114  # HTTP server without timeouts - example code
      - G115  # Integer overflow conversion - safe conversions
      - G201  # SQL string formatting - table names validated
      - G304  # File inclusion - migration files expected
      - G404  # Weak random number generator - OK for non-crypto use
      - G706  # Log injection - controlled inputs only

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - unnamedResult  # Named returns are useful for defer

  unparam:
    check-exported: false  # Don't check exported functions

issues:
  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam

    # Exclude gosec warnings in example code
    - path: examples/
      linters:
        - gosec

    # Exclude SQL formatting - table names validated at startup
    - linters:
        - gosec
      text: "G201"

    # Exclude integer overflow false positives
    - linters:
        - gosec
      text: "G115"

    # Exclude package comments
    - linters:
        - revive
      text: "should have a package comment"

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-results: true
