version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code
    - misspell      # Check for misspelled words
    - revive        # Drop-in replacement for golint
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Find unused function parameters
    - gosec         # Security checks
    - gocritic      # Opinionated linter

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow      # Too many false positives

  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true  # Not all packages need comments

  gosec:
    excludes:
      - G404  # Weak random number generator - OK for non-crypto use

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - unnamedResult  # Named returns are useful for defer

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - errcheck

    # Exclude specific issues
    - text: "should have a package comment"
      linters:
        - revive

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-results: true
