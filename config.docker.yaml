source:
  type: polling
  dsn: postgres://postgres:postgres@postgres:5432/outbox_demo?sslmode=disable
  table: outbox
  poll_interval: 1s
  batch_size: 100

publishers:
  - name: demo-webhook
    type: webhook
    url: http://webhook-receiver:8080/webhook
    timeout: 10s
    headers:
      X-Demo: pg-outboxer

delivery:
  workers: 4
  worker_buffer_size: 10
  max_retries: 10
  dead_letter_table: outbox_dead_letter

observability:
  metrics_port: 9090
  log_level: info
  log_format: json
