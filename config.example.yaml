# pg-outboxer configuration example
# Copy this to config.yaml and customize for your environment

source:
  # Source type: "cdc" (logical replication) or "polling" (SELECT polling)
  type: cdc

  # PostgreSQL connection string (supports env var interpolation)
  dsn: ${DATABASE_URL}

  # Outbox table name
  table: outbox

  # CDC-specific settings (only used when type=cdc)
  slot_name: pg_outboxer_slot
  publication: pg_outboxer_pub

  # Polling-specific settings (only used when type=polling)
  poll_interval: 500ms
  batch_size: 100

publishers:
  # You can configure multiple publishers to fan-out events
  # Events are sent to ALL publishers. If any fail, the event retries.

  - name: primary-webhook
    type: webhook
    url: https://my-service.com/events
    timeout: 10s
    signing_secret: ${WEBHOOK_SECRET}
    headers:
      Authorization: Bearer ${API_KEY}
      X-Service: pg-outboxer

  # Example: Additional webhook for another service
  # - name: stripe-webhook
  #   type: webhook
  #   url: https://api.stripe.com/webhooks
  #   timeout: 5s
  #   signing_secret: ${STRIPE_SECRET}

  # Redis Stream example (commented out)
  # - name: redis-events
  #   type: redis_stream
  #   url: redis://localhost:6379
  #   stream_name: events
  #   timeout: 5s

  # Kafka example (commented out)
  # - name: kafka-events
  #   type: kafka
  #   topic: outbox-events
  #   brokers:
  #     - localhost:9092
  #   timeout: 10s

delivery:
  # Number of parallel workers (partitioned by aggregate_id for ordering)
  workers: 4

  # Event buffer size per worker (higher = more throughput, more memory)
  worker_buffer_size: 10

  # Maximum retry attempts before moving to dead letter
  max_retries: 10

  # Dead letter table name
  dead_letter_table: outbox_dead_letter

observability:
  # Prometheus metrics HTTP port
  metrics_port: 9090

  # Log level: debug, info, warn, error
  log_level: info

  # Log format: json or text
  log_format: json
